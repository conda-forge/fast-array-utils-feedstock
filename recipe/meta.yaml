{% set name = "fast-array-utils" %}
{% set version = "1.5" %}
{% set python_min = "3.12" %}

package:
  name: {{ name|lower }}
  version: "{{ version }}"

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/fast_array_utils-{{ version }}.tar.gz
  sha256: 6151ecbb649d74f38927f1a3b67918ca3d65b1f9d2528cfaf9abb4d1ae5762e1

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatch-docstring-description >=1.1.1
    - hatch-fancy-pypi-readme
    - hatch-min-requirements
    - hatch-vcs
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=2
  run_constrained:
    - numba >=0.57
    - dask >=2023.6.1
    - scipy >=1.13

test:
  imports:
    - fast_array_utils
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://icb-fast-array-utils.readthedocs-hosted.com/
  summary: Fast array utilities with minimal dependencies.
  license: MPL-2.0
  license_file: LICENSE.rst

extra:
  recipe-maintainers:
    - mschilli87
    - flying-sheep
